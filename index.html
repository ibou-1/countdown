<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="العد التنازلي للامتحانات المدرسية بالمغرب: السادس ابتدائي، الثالثة إعدادي، الجهوي أولى باك، والوطني ثانية باك. تابع الوقت المتبقي بالأيام والساعات والدقائق والثواني.">
    <meta name="keywords" content="امتحانات المغرب, العد التنازلي, السادس ابتدائي, الثالثة إعدادي, الجهوي أولى باك, الوطني ثانية باك, مؤقت الامتحانات">
    <meta name="author" content="مؤقت الامتحانات">
    <meta property="og:title" content="العد التنازلي للامتحانات المغرب 2026">
    <meta property="og:description" content="تابع الوقت المتبقي قبل امتحاناتك المدرسية بالمغرب">
    <meta property="og:type" content="website">
    <title>العد التنازلي للامتحانات المغرب 2026 | مؤقت الامتحانات المدرسية</title>

    <script defer src="https://cloud.umami.is/script.js" data-website-id="bc6e9193-2734-402d-8d8f-b336a22b0d8c"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            padding: 20px;
            line-height: 1.6;
            direction: rtl;
            text-align: right;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        .container {
            max-width: 1470px;
            margin: 0 auto;
        }
        
        .timers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .timer-card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .timer-title {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        
        .timer-date {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        
        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        
        .time-unit {
            text-align: center;
        }
        
        .time-value {
            font-size: 32px;
            font-weight: 700;
            color: #3498db;
            display: block;
        }
        
        .time-label {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 4px;
        }
        
        .expired {
            text-align: center;
            color: #e74c3c;
            font-weight: 600;
            font-size: 18px;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #7f8c8d;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }
            
            .timer-title {
                font-size: 18px;
            }
            
            .time-value {
                font-size: 28px;
            }
            
            .countdown {
                gap: 8px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            
            .timer-card {
                padding: 20px;
            }
            
            .time-value {
                font-size: 24px;
            }
            
            .time-label {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>العد التنازلي لامتحانات المغرب 2026</h1>
            <p>راقب الوقت المتبقي قبل امتحاناتك</p>
        </header>
        
        <main class="timers-grid">
            <article class="timer-card">
                <h2 class="timer-title">امتحان السادس الابتدائي</h2>
                <p class="timer-date" id="date-1"></p>
                <div id="timer-1" class="countdown"></div>
            </article>
            
            <article class="timer-card">
                <h2 class="timer-title">امتحان السنة الثالثة ثانوي</h2>
                <p class="timer-date" id="date-2"></p>
                <div id="timer-2" class="countdown"></div>
            </article>
            
            <article class="timer-card">
                <h2 class="timer-title">الامتحان الجهوي للسنة الأولى بكالوريا</h2>
                <p class="timer-date" id="date-3"></p>
                <div id="timer-3" class="countdown"></div>
            </article>
            
            <article class="timer-card">
                <h2 class="timer-title">الامتحان الوطني للسنة الثانية بكالوريا</h2>
                <p class="timer-date" id="date-4"></p>
                <div id="timer-4" class="countdown"></div>
            </article>
        </main>
        
        <footer>
            <p>سدد الله خطاكم ووفقكم لما فيه الخير والنجاح</p>
        </footer>
    </div>
    
    <script>
        const examDates = [
            { id: 1, date: '2026-06-26 08:00:00', name: 'Examen 6ème Primaire' },
            { id: 2, date: '2026-06-24 08:00:00', name: 'Examen 3ème Secondaire' },
            { id: 3, date: '2026-06-01 08:00:00', name: 'Régional 1ère Bac' },
            { id: 4, date: '2026-06-04 08:00:00', name: 'National 2ème Bac' }
        ];
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            return date.toLocaleDateString('ar-MA', options);
        }
        
        function updateTimer(examId, targetDate) {
            const now = new Date().getTime();
            const target = new Date(targetDate).getTime();
            const difference = target - now;
            
            const timerElement = document.getElementById(`timer-${examId}`);
            
            if (difference < 0) {
                timerElement.style.display = "flex"
                timerElement.innerHTML = '<div class="expired">لقد بدأ الإمتحان !</div>';
                return false;
            }
            
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);
            
            timerElement.innerHTML = `
                <div class="time-unit">
                    <span class="time-value">${seconds}</span>
                    <span class="time-label">ثواني</span>
                </div>
                <div class="time-unit">
                    <span class="time-value">${minutes}</span>
                    <span class="time-label">دقائق</span>
                </div>
                <div class="time-unit">
                    <span class="time-value">${hours}</span>
                    <span class="time-label">ساعات</span>
                </div>
                <div class="time-unit">
                    <span class="time-value">${days}</span>
                    <span class="time-label">أيام</span>
                </div>
            `;
            
            return true;
        }
        
        // Initialize dates
        examDates.forEach(exam => {
            document.getElementById(`date-${exam.id}`).textContent = formatDate(exam.date);
        });
        
        // Update all timers
        function updateAllTimers() {
            examDates.forEach(exam => {
                updateTimer(exam.id, exam.date);
            });
        }
        
        // Initial update
        updateAllTimers();
        
        // Update every second
        setInterval(updateAllTimers, 1000);
    </script>
</body>
</html>
